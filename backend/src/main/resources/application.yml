spring:
  application:
    name: campusone-backend
  config:
    # Spring Boot does not load .env automatically. This extension hint treats
    # backend/.env as a standard properties file when running from /backend.
    import: optional:file:.env[.properties]
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-migration-naming: true
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  jackson:
    time-zone: UTC

server:
  error:
    include-message: never
    include-binding-errors: never
    include-stacktrace: never
  forward-headers-strategy: framework

springdoc:
  api-docs:
    path: /api/v1/openapi
  swagger-ui:
    path: /api/v1/swagger-ui
    operations-sorter: method
    tags-sorter: alpha

app:
  jwt:
    # Standard Base64 encoding of at least 32 cryptographically random bytes.
    # Raw text and Base64URL values are intentionally rejected at startup.
    secret: ${JWT_SECRET:}
    issuer: ${JWT_ISSUER:campusone-backend}
    access-token-ttl: ${JWT_ACCESS_TOKEN_TTL:15m}
  auth:
    refresh-token-ttl: ${REFRESH_TOKEN_TTL_DAYS:7}d
    refresh-token-cookie-name: campusone_refresh_token
    cookie-secure: ${AUTH_COOKIE_SECURE:true}
    cookie-domain: ${AUTH_COOKIE_DOMAIN:}
