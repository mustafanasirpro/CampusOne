spring:
  application:
    name: campusone-backend
  profiles:
    # Allows the imported .env properties file to use the conventional
    # environment-variable name. Maven's run goal overrides this with local.
    active: ${SPRING_PROFILES_ACTIVE:}
  config:
    # Spring Boot does not load .env automatically. This extension hint treats
    # backend/.env as a standard properties file when running from /backend.
    import: optional:file:.env[.properties]
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-migration-naming: true
    url: ${FLYWAY_URL:${DB_URL}}
    user: ${FLYWAY_USERNAME:${DB_USERNAME}}
    password: ${FLYWAY_PASSWORD:${DB_PASSWORD}}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  jackson:
    time-zone: UTC
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:${MAIL_ENABLED:false}}
          connectiontimeout: ${MAIL_SMTP_CONNECTION_TIMEOUT_MS:10000}
          timeout: ${MAIL_SMTP_TIMEOUT_MS:10000}
          writetimeout: ${MAIL_SMTP_WRITE_TIMEOUT_MS:10000}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS_ENABLE:${MAIL_ENABLED:false}}
            required: ${MAIL_SMTP_STARTTLS_REQUIRED:${MAIL_SMTP_STARTTLS_ENABLE:${MAIL_ENABLED:false}}}

server:
  port: ${SERVER_PORT:${PORT:8080}}
  error:
    include-message: never
    include-binding-errors: never
    include-stacktrace: never
  forward-headers-strategy: framework

springdoc:
  api-docs:
    path: /api/v1/openapi
    enabled: ${OPENAPI_ENABLED:true}
  swagger-ui:
    path: /api/v1/swagger-ui
    enabled: ${OPENAPI_ENABLED:true}
    operations-sorter: method
    tags-sorter: alpha

campusone:
  aura:
    enabled: ${AURA_ENABLED:true}

app:
  jwt:
    # Standard Base64 encoding of at least 32 cryptographically random bytes.
    # Raw text and Base64URL values are intentionally rejected at startup.
    secret: ${JWT_SECRET:}
    issuer: ${JWT_ISSUER:campusone-backend}
    audience: ${JWT_AUDIENCE:campusone-api}
    access-token-ttl: ${JWT_ACCESS_TOKEN_TTL:15m}
  auth:
    refresh-token-ttl: ${REFRESH_TOKEN_TTL_DAYS:7}d
    refresh-token-cookie-name: campusone_refresh_token
    cookie-secure: ${AUTH_COOKIE_SECURE:true}
    cookie-same-site: ${AUTH_COOKIE_SAME_SITE:None}
    refresh-token-cleanup-interval: ${REFRESH_TOKEN_CLEANUP_INTERVAL:24h}
    max-login-attempts: ${MAX_LOGIN_ATTEMPTS:5}
    account-lock-duration: ${ACCOUNT_LOCK_MINUTES:15}m
  password-reset:
    token-ttl: ${PASSWORD_RESET_TOKEN_TTL_MINUTES:30}m
    frontend-url: ${APP_FRONTEND_URL:http://localhost:5173}
    mail-provider: ${MAIL_PROVIDER:disabled}
    mail-enabled: ${MAIL_ENABLED:false}
    mail-from: ${MAIL_FROM:}
    resend-api-key: ${RESEND_API_KEY:}
    resend-from: ${RESEND_FROM:}
    resend-api-url: ${RESEND_API_URL:https://api.resend.com/emails}
    resend-timeout: ${RESEND_TIMEOUT:10s}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}}
  storage:
    provider: ${STORAGE_PROVIDER:disabled}
    max-upload-size-mb: ${MAX_UPLOAD_SIZE_MB:25}
    marketplace-max-images-per-listing: ${MARKETPLACE_MAX_IMAGES_PER_LISTING:5}
    marketplace-max-image-size-mb: ${MARKETPLACE_MAX_IMAGE_SIZE_MB:5}
    admin-max-uploads-per-day: ${ADMIN_MAX_UPLOADS_PER_DAY:200}
    admin-max-storage-mb-per-month: ${ADMIN_MAX_STORAGE_MB_PER_MONTH:5000}
    global-upload-storage-cap-mb: ${GLOBAL_UPLOAD_STORAGE_CAP_MB:8192}
    download-url-ttl: ${STORAGE_DOWNLOAD_URL_TTL:10m}
    r2:
      endpoint: ${R2_ENDPOINT:}
      access-key-id: ${R2_ACCESS_KEY_ID:}
      secret-access-key: ${R2_SECRET_ACCESS_KEY:}
      bucket: ${R2_BUCKET:}
      region: ${R2_REGION:auto}
      public-base-url: ${R2_PUBLIC_BASE_URL:}
  notes:
    admin-upload-emails: ${ADMIN_UPLOAD_EMAILS:}
