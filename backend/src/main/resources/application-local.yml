spring:
  config:
    activate:
      on-profile: local

springdoc:
  api-docs:
    enabled: ${OPENAPI_ENABLED:true}
  swagger-ui:
    enabled: ${OPENAPI_ENABLED:true}

app:
  auth:
    # Local development uses HTTP. Production keeps the secure base default.
    cookie-secure: ${AUTH_COOKIE_SECURE:false}
  cors:
    # Exact loopback origins remain available when no deployment override is set.
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}

logging:
  level:
    com.campusone: DEBUG
    org.hibernate.SQL: INFO
